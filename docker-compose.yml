services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: properties_poc_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: properties_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - properties_poc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d properties_poc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  properties_poc_pgdata:
