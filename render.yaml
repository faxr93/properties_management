# Render Blueprint — provisions both the web service and a Postgres database
# in one go. Apply it from the Render dashboard:
#   New + → Blueprint → connect repo → pick this file.
#
# Anything marked `sync: false` is a value you must fill in via the Render
# dashboard after the service is created (Render won't store it in this file).
#
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: properties-poc
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /dashboard
    envVars:
      # --- Laravel application config ---
      - key: APP_NAME
        value: "Properties POC"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        # Render generates this on first deploy. Fill it in afterwards as
        #   https://properties-poc.onrender.com
        sync: false
      - key: APP_KEY
        # Generate locally with:
        #   php -r "echo 'base64:'.base64_encode(random_bytes(32)).PHP_EOL;"
        # then paste the value here in the Render dashboard.
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info

      # --- Database (auto-wired from the Postgres service below) ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: properties-poc-db
          property: connectionString

      # --- Session / cache / queue (single-instance friendly defaults) ---
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local

      # --- Trust Render's reverse proxy so generated URLs use https:// ---
      - key: TRUSTED_PROXIES
        value: "*"

databases:
  - name: properties-poc-db
    databaseName: properties_poc
    user: properties_poc
    plan: free
    region: singapore
    postgresMajorVersion: "16"
